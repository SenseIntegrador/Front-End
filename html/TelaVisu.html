<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/TelaVisu.css">
    <link rel="shortcut icon" href="../img/IconFav.png" type="image/x-icon">
    <script src="../js/TelaVisu.js"></script>
</head>
<body>
    <header class="menuNav">    
         <nav>
            <img src="../img/LogoSense.png" alt="LogoSense">
            <h1>Sense</h1>
            <div class="posslkink">
            <a href="dash.html" id="DashNav">DashBoard</a>
            <a href="TelaVisu.html" id="HistoNav">Historico</a>
            </div>

        </nav>
    </header>
    <header class="boxGraf">
    <Section class="BoxTempera">
        <div class="filtroTempe">
        <select class="box_fil" onchange="filtroTemperatura(this.value)">
            <option disabled selected hidden>FILTRAR</option>
            <option value="recentes">Recentes</option>
            <option value="antigas">Antigas</option>
            <option value="maxima">Maxima</option>
            <option value="minima">Minima</option>
        </select>
        </div>
        <h2>Temperatura</h2>
        <div id="GaugeTempe">
        </div>
        <div id="GrafiTempe">
            <ul id="lsTemp"></ul>
        </div>
    </Section>
       <Section class="BoxUmida">
        <div class="filtroUmida">        
        <select class="box_fil" onchange="filtroUmidade(this.value)">
            <option disabled selected hidden>FILTRAR</option>
            <option value="recentes">Recentes</option>
            <option value="antigas">Antigas</option>
            <option value="maxima">Maxima</option>
            <option value="minima">Minima</option>
        </select>
        </div>

        <h2>Umidade</h2>
        <div id="GaugeUmida">
        </div>
        <div id="GrafiUmida">
            <ul id="lsUmi"></ul>
        </div>
    </Section>        
    </header>


</body>
<script src="../js/TelaVisu.js"></script>
</html>
